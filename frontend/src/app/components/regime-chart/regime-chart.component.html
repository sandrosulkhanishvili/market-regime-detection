<div class="chart-wrapper">
  <div class="legend">
    <span *ngFor="let entry of [0, 1, 2]" class="legend-item">
      <span class="dot" [style.background]="regimeConfig[entry].color"></span>
      {{ regimeConfig[entry].label }}
    </span>
  </div>
  <div class="canvas-container">
    <canvas #chartCanvas></canvas>
  </div>
</div>
